schema_version: 1

context:
  python_min: "3.10"
  name: cinnabar
  version: "0.6.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/OpenFreeEnergy/${{ name }}/archive/refs/tags/${{ version }}.tar.gz
  sha256: 25455158cb70686394d98a810f7b5b1445eae95a44e69d2cb1b645cf9a69d155

build:
  number: 0
  noarch: python
  script: SETUPTOOLS_SCM_PRETEND_VERSION=${{ version }} ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - cinnabar = cinnabar.cli:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=80.0
    - setuptools_scm >=8
  run:
    - adjusttext
    - matplotlib-base
    - networkx
    - numpy 
    - openff-units
    - plotly
    - python >=${{ python_min }}
    - scikit-learn
    - seaborn

tests:
  - python:
      imports:
        - cinnabar
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - pytest
        - python ${{ python_min }}.*
    script:
      - python -c "import ${{ name }}; print(${{ name }}.__version__)"
      - python -c "import ${{ name }}; assert(${{ name }}.__version__ == '${{ version }}')"
      - pytest --pyargs cinnabar

about:
  license: MIT
  license_file: LICENSE
  summary: Consistent presentation of free energy data
  homepage: https://github.com/OpenFreeEnergy/cinnabar

extra:
  recipe-maintainers:
    - jthorton
    - mikemhenry
    - IAlibay
    - dwhswenson
    - RiesBen
    - atravitz
