schema_version: 1

context:
  python_min: "3.10"
  name: cinnabar
  version: "0.5.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/OpenFreeEnergy/${{ name }}/archive/refs/tags/${{ version }}.tar.gz
  sha256: e096d995c71c2860fbdc45a1370801249e8cce5ee12b54cd6d9362ec40dd91bd

build:
  number: 3
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - cinnabar = cinnabar.arsenic:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=61.0
  run:
    - adjusttext
    - matplotlib-base
    - networkx
    - numpy <2.4.0  # https://github.com/OpenFreeEnergy/cinnabar/issues/198
    - openff-units
    - plotly
    - pydantic >=1.10.17
    - python >=${{ python_min }}
    - scikit-learn
    - seaborn

tests:
  - python:
      imports:
        - cinnabar
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - pytest
        - python ${{ python_min }}.*
    script:
      - pytest --pyargs cinnabar

about:
  license: MIT
  license_file: LICENSE
  summary: Consistent presentation of free energy data
  homepage: https://github.com/OpenFreeEnergy/cinnabar

extra:
  recipe-maintainers:
    - mikemhenry
    - IAlibay
    - dwhswenson
    - RiesBen
    - atravitz
